version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: billsmart_db
      MYSQL_USER: billsmart_user
      MYSQL_PASSWORD: your_secure_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "3306:3306"
    networks:
      - billsmart-network
    command: --default-authentication-plugin=mysql_native_password

  # FastAPI Backend
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql+pymysql://billsmart_user:your_secure_password@db:3306/billsmart_db
      SECRET_KEY: your-super-secret-key-change-this-in-production
      DEBUG: "True"
    volumes:
      - .:/app
    networks:
      - billsmart-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Redis (optional, for caching)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - billsmart-network

volumes:
  mysql_data:

networks:
  billsmart-network:
    driver: bridge
