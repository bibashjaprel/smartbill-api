version: "3.9"

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
  POSTGRES_DB: ${POSTGRES_DB:-billsmart_db}

services:
  db:
    image: postgres:15
    container_name: smartbill-db
    restart: always
    environment: *postgres-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: smartbill-api
    restart: always
    depends_on:
      - db
    environment:
      <<: *postgres-env
      POSTGRES_HOST: db
      SECRET_KEY: ${SECRET_KEY:-your-secret-key}
    ports:
      - "8000:8000"

volumes:
  postgres_data:
