services:
  api:
    build: .
    container_name: smartbill-api
    restart: always
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      PORT: 8000
      RELOAD: "false"
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
