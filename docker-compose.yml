version: "3.9"

services:
  db:
    image: postgres:15
    container_name: smartbill-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      POSTGRES_DB: ${POSTGRES_DB:-billsmart_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: smartbill-api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-root}@db:5432/${POSTGRES_DB:-billsmart_db}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key}
    ports:
      - "8000:8000"

volumes:
  postgres_data:
